<div class="modal-overlay" *ngIf="visible" (click)="onFermer()">
  <div class="modal-container" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h3 class="modal-title">Ajouter un paragraphe</h3>
      <button class="btn-close" (click)="onFermer()">✕</button>
    </div>

    <div class="modal-body">
      <p class="modal-subtitle">
        Définissez le code et le libellé du nouveau paragraphe budgétaire.
        Une colonne correspondante sera ajoutée au tableau.
      </p>

      <!-- Code -->
      <div class="form-field">
        <label class="form-label">Code <span class="required">*</span></label>
        <input
          type="text"
          class="form-input"
          [(ngModel)]="code"
          placeholder="Ex : P601"
          maxlength="20" />
      </div>

      <!-- Libellé -->
      <div class="form-field">
        <label class="form-label">Libellé <span class="required">*</span></label>
        <input
          type="text"
          class="form-input"
          [(ngModel)]="label"
          placeholder="Ex : Indemnité de résidence"
          maxlength="100" />
      </div>

      <!-- Message d'erreur -->
      <div class="form-erreur" *ngIf="erreur">
        ⚠ {{ erreur }}
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-annuler" (click)="onFermer()">Annuler</button>
      <button class="btn-confirmer" (click)="onSauvegarder()">Ajouter la colonne</button>
    </div>

  </div>
</div>
