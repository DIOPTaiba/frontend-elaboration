<div class="filter-params-panel">
  <div class="filter-params-header" (click)="toggleFilter($event)">
    <h3 class="filter-params-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      Filtres
      <span class="filter-badge" *ngIf="activeFilterCount > 0">{{ activeFilterCount }}</span>
    </h3>
    <span class="filter-toggle-icon" [class.open]="showFilter">&#9660;</span>
  </div>

  <div class="filter-body" *ngIf="showFilter">
    <div class="filter-row">

      <!-- Emploi -->
      <div class="filter-field custom-field filter-field-emploi">
        <label class="custom-label">Emploi</label>
        <mat-select [(ngModel)]="filterEmploi" (ngModelChange)="onFilterChange()" class="custom-select">
          <mat-option value="">-- Tous --</mat-option>
          <mat-option *ngFor="let e of emplois" [value]="e.code">{{ e.libelle }}</mat-option>
        </mat-select>
      </div>

      <!-- Chapitre -->
      <div class="filter-field custom-field filter-field-chapitre" style="flex: 0 0 800px;">
        <label class="custom-label">Chapitre</label>
        <div class="custom-input-wrapper">
          <input class="custom-input" [(ngModel)]="filterChapitre"
                 placeholder="Rechercher un chapitre..."
                 (ngModelChange)="onFilterChange()" />
          <button *ngIf="filterChapitre" class="clear-btn" (click)="clearField('chapitre')">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>

      <!-- Action -->
      <div class="filter-field custom-field filter-field--wide">
        <label class="custom-label">Action</label>
        <div class="custom-input-wrapper">
          <input class="custom-input" [(ngModel)]="filterAction"
                 placeholder="Rechercher une action..."
                 (ngModelChange)="onFilterChange()" />
          <button *ngIf="filterAction" class="clear-btn" (click)="clearField('action')">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>

    </div>

    <div class="filter-row">

      <!-- Activité -->
      <div class="filter-field custom-field filter-field--wide">
        <label class="custom-label">Activité</label>
        <div class="custom-input-wrapper">
          <input class="custom-input" [(ngModel)]="filterActivite"
                 placeholder="Rechercher une activité..."
                 (ngModelChange)="onFilterChange()" />
          <button *ngIf="filterActivite" class="clear-btn" (click)="clearField('activite')">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>

      <!-- Matricule -->
      <div class="filter-field custom-field">
        <label class="custom-label">Matricule</label>
        <div class="custom-input-wrapper">
          <input class="custom-input" [(ngModel)]="filterMatricule"
                 placeholder="Rechercher un matricule..."
                 (ngModelChange)="onFilterChange()" />
          <button *ngIf="filterMatricule" class="clear-btn" (click)="clearField('matricule')">
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>

      <!-- Boutons -->
      <div class="filter-actions-field">
        <label class="custom-label" style="visibility: hidden;">_</label>
        <div class="filter-actions-buttons">
          <button mat-raised-button color="primary" (click)="applyFilter()" class="btn-appliquer">
            <mat-icon>check</mat-icon>
            Appliquer
          </button>
          <button mat-stroked-button (click)="resetFilter()" class="btn-reinitialiser">
            <mat-icon>refresh</mat-icon>
            Réinitialiser
          </button>
        </div>
      </div>

    </div>

    <!-- Tags filtres actifs -->
    <div class="filter-tags" *ngIf="activeFilterCount > 0">
      <span class="filter-tag" *ngIf="filterEmploi">
        Emploi : {{ filterEmploi }}
        <button (click)="clearField('emploi')">&#x2715;</button>
      </span>
      <span class="filter-tag" *ngIf="filterChapitre">
        Chapitre : {{ filterChapitre }}
        <button (click)="clearField('chapitre')">&#x2715;</button>
      </span>
      <span class="filter-tag" *ngIf="filterMatricule">
        Matricule : {{ filterMatricule }}
        <button (click)="clearField('matricule')">&#x2715;</button>
      </span>
      <span class="filter-tag" *ngIf="filterAction">
        Action : {{ filterAction }}
        <button (click)="clearField('action')">&#x2715;</button>
      </span>
      <span class="filter-tag" *ngIf="filterActivite">
        Activité : {{ filterActivite }}
        <button (click)="clearField('activite')">&#x2715;</button>
      </span>
    </div>
  </div>
</div>
