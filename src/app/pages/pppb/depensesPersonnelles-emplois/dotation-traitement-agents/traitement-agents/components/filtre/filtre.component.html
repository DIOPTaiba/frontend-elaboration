<div class="filter-params-panel">
  <div class="filter-params-header" (click)="toggleFilter($event)">
    <h3 class="filter-params-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      Filtres
      <span class="filter-badge" *ngIf="activeFilterCount > 0">{{ activeFilterCount }}</span>
    </h3>
    <span class="filter-toggle-icon" [class.open]="showFilter">&#9660;</span>
  </div>

  <div class="filter-body" *ngIf="showFilter">
    <div class="search-params-row">

      <!-- Emploi -->
      <div class="search-field search-field-emploi">
        <label class="search-label">Emploi</label>
        <div class="search-select-wrapper">
          <select [(ngModel)]="filterEmploi" class="search-select" (ngModelChange)="onFilterChange()">
            <option value="">-- Tous --</option>
            <option *ngFor="let e of emplois" [value]="e.code">{{ e.libelle }}</option>
          </select>
          <span class="select-arrow">&#9660;</span>
        </div>
      </div>

      <!-- Chapitre -->
      <div class="search-field search-field-chapitre">
        <label class="search-label">Chapitre</label>
        <div class="search-input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" [(ngModel)]="filterChapitre" class="search-input"
                 placeholder="Rechercher un chapitre..." (ngModelChange)="onFilterChange()" />
          <button class="input-clear" *ngIf="filterChapitre" (click)="clearField('chapitre')">&#x2715;</button>
        </div>
      </div>

      <!-- Action -->
      <div class="search-field search-field--wide">
        <label class="search-label">Action</label>
        <div class="search-input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" [(ngModel)]="filterAction" class="search-input"
                 placeholder="Rechercher une action..." (ngModelChange)="onFilterChange()" />
          <button class="input-clear" *ngIf="filterAction" (click)="clearField('action')">&#x2715;</button>
        </div>
      </div>
    </div>

    <div class="search-params-row">

      <!-- Activité -->
      <div class="search-field search-field-activite search-field--wide">
        <label class="search-label">Activité</label>
        <div class="search-input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" [(ngModel)]="filterActivite" class="search-input"
                 placeholder="Rechercher une activité..." (ngModelChange)="onFilterChange()" />
          <button class="input-clear" *ngIf="filterActivite" (click)="clearField('activite')">&#x2715;</button>
        </div>
      </div>

      <!-- Matricule -->
      <div class="search-field">
        <label class="search-label">Matricule</label>
        <div class="search-input-wrapper">
          <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" [(ngModel)]="filterMatricule" class="search-input"
                 placeholder="Rechercher un matricule..." (ngModelChange)="onFilterChange()" />
          <button class="input-clear" *ngIf="filterMatricule" (click)="clearField('matricule')">&#x2715;</button>
        </div>
      </div>

      <!-- Boutons -->
      <div class="search-field filter-actions-field">
        <label class="search-label">&nbsp;</label>
        <div class="filter-action-btns">
          <button class="btn-apply" (click)="applyFilter()">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Appliquer
          </button>
          <button class="btn-reset" (click)="resetFilter()">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
            </svg>
            Réinitialiser
          </button>
        </div>
      </div>
    </div>

    <!-- Tags filtres actifs -->
    <div class="filter-tags" *ngIf="activeFilterCount > 0">
      <span class="filter-tag" *ngIf="filterEmploi">
        Emploi : {{ filterEmploi }}<button (click)="clearField('emploi')">&#x2715;</button>
      </span>
      <span class="filter-tag" *ngIf="filterChapitre">
        Chapitre : {{ filterChapitre }}<button (click)="clearField('chapitre')">&#x2715;</button>
      </span>
      <span class="filter-tag" *ngIf="filterMatricule">
        Matricule : {{ filterMatricule }}<button (click)="clearField('matricule')">&#x2715;</button>
      </span>
      <span class="filter-tag" *ngIf="filterAction">
        Action : {{ filterAction }}<button (click)="clearField('action')">&#x2715;</button>
      </span>
      <span class="filter-tag" *ngIf="filterActivite">
        Activité : {{ filterActivite }}<button (click)="clearField('activite')">&#x2715;</button>
      </span>
    </div>
  </div>
</div>
