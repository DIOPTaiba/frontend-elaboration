<mat-card class="cardWithShadow">
  <mat-card-content>
    <mat-card-title class="titre f-s-16 f-w-500">Paramètres de recherche</mat-card-title>
    <div class="container-fluid">
      <div class="row">
        <div class="row">
          <div class="col-6">
            <div class="row col-sm-4">
              <div class="col-sm-4 d-flex align-items-center">
                <mat-label class="f-s-14 f-w-600 d-block m-b-16">Exercice</mat-label>
              </div>
              <div class="col-sm-8">
                <mat-form-field appearance="outline" class="w-100">
                  <input disabled matInput />
                </mat-form-field>
              </div>
            </div>
            <div class="row">
              <mat-form-field appearance="outline" class="w-100">
                <mat-select value="male">
                  <mat-option value="male">Projet de loi de finances 2027</mat-option>
                  <mat-option value="female">Projet de loi de finances 2026</mat-option>
                  <mat-option value="other">Projet de loi de finances 2025</mat-option>
                </mat-select>
              </mat-form-field>
            </div>
          </div>
        </div>

        <div class="col-6">
          <div class="row col-sm-4">
            <div class="col-sm-4 d-flex align-items-center">
              <mat-label class="f-s-14 f-w-600 d-block m-b-16">Emploi</mat-label>
            </div>
            <div class="col-sm-8">
              <mat-form-field appearance="outline" class="w-100">
                <input disabled matInput />
              </mat-form-field>
            </div>
          </div>
          <div class="row">
            <mat-form-field appearance="outline" class="w-100">
              <mat-select value="male">
                <mat-option value="male">Emploi 1</mat-option>
                <mat-option value="female">Emploi 2</mat-option>
                <mat-option value="other">Emploi 3</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
        </div>

      </div>

    </div>
  </mat-card-content>
</mat-card>
