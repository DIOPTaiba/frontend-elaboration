<div class="modal-overlay" *ngIf="isVisible" (click)="onOverlayClick($event)">
  <div class="modal-container" role="dialog" aria-labelledby="modal-title">

    <!-- Title Bar -->
    <div class="modal-titlebar">
      <mat-icon class="titlebar-icon">assignment</mat-icon>
      <span id="modal-title" class="titlebar-text">Natures économiques à budgétiser</span>
    </div>

    <!-- Body (scrollable) -->
    <div class="modal-body">

      <!-- Card 1 : Ajout de lignes budgétaires -->
      <mat-card class="cardWithShadow b-1 rounded">
        <h5 class="text-muted m-b-12">Ajout de lignes budgétaires</h5>

        <div class="modal-form-row">
          <label class="f-s-14 f-w-600">Section</label>
          <div class="modal-form-fields">
            <mat-form-field appearance="outline" class="field-code">
              <input matInput readonly [value]="section.sec_code" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="field-flex">
              <input matInput readonly [value]="section.sec_libelle" />
            </mat-form-field>
          </div>
        </div>

        <div class="modal-form-row">
          <label class="f-s-14 f-w-600">Programme</label>
          <div class="modal-form-fields">
            <mat-form-field appearance="outline" class="field-code">
              <input matInput readonly [value]="programme?.proCode ?? ''" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="field-flex">
              <input matInput readonly [value]="programme?.proLibelle ?? ''" />
            </mat-form-field>
          </div>
        </div>

        <div class="modal-form-row">
          <label class="f-s-14 f-w-600">Catégorie de dépense</label>
         <div class="modal-form-fields">
            <mat-form-field appearance="outline" class="field-code">
              <input matInput readonly [value]="categorieDepense?.cadeCode ?? ''" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="field-flex">
              <input matInput readonly [value]="categorieDepense?.cadeLib ?? ''" />
            </mat-form-field>
          </div>
        </div>

        <div class="modal-form-row">
          <label class="f-s-14 f-w-600">Chapitre</label>
          <div class="modal-form-fields">
            <mat-form-field appearance="outline" class="field-code">
              <input matInput readonly [value]="chapitre?.chapCode ?? ''" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="field-flex">
              <input matInput readonly [value]="chapitre?.chapLib ?? ''" />
            </mat-form-field>
          </div>
        </div>

        <div class="modal-form-row">
          <label class="f-s-14 f-w-600">Action</label>
          <div class="modal-form-fields">
            <mat-form-field appearance="outline" class="field-code">
              <input matInput readonly [value]="selectedAction?.copCode ?? ''" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="field-flex">
              <mat-select [(ngModel)]="selectedAction" (ngModelChange)="onActionSelect()">
                <mat-option *ngFor="let a of actions" [value]="a">{{ a.copLibelle }}</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
        </div>

        <div class="modal-form-row">
          <label class="f-s-14 f-w-600">Activité</label>
          <div class="modal-form-fields">
            <mat-form-field appearance="outline" class="field-code">
              <input matInput readonly [value]="selectedActivite?.copCode ?? ''" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="field-flex">
              <mat-select [(ngModel)]="selectedActivite" (ngModelChange)="onActiviteSelect()">
                <!-- <mat-option [value]="null"></mat-option> -->
                <mat-option *ngFor="let a of activites" [value]="a">{{ a.copLibelle }}</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
        </div>

      </mat-card>

      <!-- Card 2 : Recherche de nature économique -->
      <mat-card class="cardWithShadow b-1 rounded">
        <h5 class="text-muted m-b-12">Recherche de nature économique</h5>

        <div class="search-filter-row m-b-12">
          <div class="search-filter-group">
            <label class="f-s-14 f-w-600">Code</label>
            <ng-select
              class="w-100 widthCode "
              [(ngModel)]="selectedCode"
              (change)="onCodeChange()"
              [items]="natures"
              bindLabel="codeLigne"
              bindValue="codeLigne"
              placeholder="-- Tous --"
              [searchable]="true"
              [clearable]="true"
              notFoundText="Aucun résultat">
            </ng-select>
          </div>
          <div class="search-filter-group search-filter-grow">
            <label class="f-s-14 f-w-600">Libellé</label>
            <ng-select
              class="w-100"
              [(ngModel)]="selectedLibelle"
              (change)="onLibelleChange()"
              [items]="natures"
              bindLabel="libLigne"
              bindValue="libLigne"
              placeholder="-- Tous --"
              [searchable]="true"
              [clearable]="true"
              notFoundText="Aucun résultat">
            </ng-select>
          </div>
        </div>

        <!-- Spinner -->
        <div *ngIf="isLoadingNatures" class="spinner-center">
          <mat-spinner diameter="40"></mat-spinner>
        </div>

        <!-- Table -->
        <div class="table-wrapper" *ngIf="!isLoadingNatures">
          <table class="nature-table">
            <thead>
              <tr>
                <th class="col-check"></th>
                <th class="col-code">Code</th>
                <th class="col-libelle">Libellé</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of filteredNatures; let i = index"
                  [class.row-selected]="isSelected(item)"
                  (click)="toggleSelection(item)">
                <td class="col-check">
                  <input type="checkbox" [checked]="isSelected(item)"
                         (click)="$event.stopPropagation()" (change)="onCheckChange(item)" />
                </td>
                <td class="col-code">{{ item.codeLigne }}</td>
                <td class="col-libelle">{{ item.libLigne }}</td>
              </tr>
              <tr *ngIf="filteredNatures.length === 0">
                <td colspan="3" class="empty-row">Aucune donnée.</td>
              </tr>
            </tbody>
          </table>
        </div>

      </mat-card>

    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button mat-flat-button class="btn-modal-ajouter" (click)="onAjouter()" [disabled]="selectedItems.length === 0">
        <mat-icon>add</mat-icon>
        Ajouter
      </button>
      <button mat-flat-button class="btn-modal-fermer" (click)="onFermer()">
        <mat-icon>close</mat-icon>
        Fermer
      </button>
    </div>

  </div>
</div>
