@if(!item.navCap) {
  <div 
  
  style="position: relative; width: 100%;"
>
  <a
  (mouseenter)="onMouseEnter()" 
  (mouseleave)="onMouseLeave()"
     class="cursor-pointer menuLink"
    (click)="onItemSelected(item)"
    [ngClass]="{
      activeMenu: item.route ? router.isActive(item.route, true) : false
    }"
  >
     @if(item.subItemIcon){
    <span class="iconify routeIcon sub-item-icon" matListItemIcon [attr.data-icon]="item.iconName"></span>
    } @else {
    <span class="iconify routeIcon" matListItemIcon [attr.data-icon]="item.iconName"></span>
    }
    {{ item.displayName }}
    @if(item.children && item.children.length) {
    <span class="down-icon d-flex m-l-auto">
      <mat-icon>expand_more</mat-icon>
    </span>
    }
  </a>
   @if(item.children && item.children.length && isHovered) {
     <div
        class="dropdown-bridge"
        (mouseenter)="cancelHide()"
        (mouseleave)="onMouseLeave()"
        [style.top.px]="dropdownTop - 10"
        [style.left.px]="dropdownLeft - 10"
        [style.width.px]="10"
        [style.height.px]="20"
        style="position: fixed; z-index: 9998;"
      ></div>
  <div 
    class="childBox"
     class="childBox"
        (mouseenter)="cancelHide()"
        (mouseleave)="onMouseLeave()"
    [style.top.px]="dropdownTop"
    [style.left.px]="dropdownLeft"
  >
   @for(child of item.children; track child) {
  <app-horizontal-nav-item 
    [item]="child" 
    [depth]="depth + 1"
    class="ddmenu">
  </app-horizontal-nav-item>

    }
  </div>
  }
</div>
}
